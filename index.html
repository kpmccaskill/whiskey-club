<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Good Friday Whiskey Club</title>
<style>
:root {
  --bg: #141009;
  --surface: #1e1609;
  --surface2: #2a1e0e;
  --border: #3d2e18;
  --border-light: #4f3c22;
  --gold: #c8922a;
  --gold-light: #e0b050;
  --gold-dim: #8a6020;
  --text: #f0e8d8;
  --text-dim: #9a8060;
  --text-mid: #c4a880;
  --green: #5a9e6f;
  --amber: #d4882a;
  --blue: #6090b8;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{background:linear-gradient(180deg,#1e1406 0%,#141009 100%);border-bottom:1px solid var(--border);padding:16px 16px 12px;text-align:center;display:flex;align-items:center;justify-content:center;gap:14px}
.header-logo{flex-shrink:0;width:64px;height:64px}
.header-text h1{font-size:1.4rem;color:var(--gold-light);letter-spacing:.04em;font-weight:700;text-align:left}
.header-text p{color:var(--text-dim);font-size:.78rem;margin-top:2px;text-align:left}
@media(max-width:400px){.header{flex-direction:column;gap:8px}.header-text h1,.header-text p{text-align:center}}

/* MEMBER TABS */
.member-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 8px;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:2px;position:sticky;top:0;z-index:20}
.member-tabs::-webkit-scrollbar{display:none}
.mtab{padding:13px 16px;font-size:.88rem;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;user-select:none;flex-shrink:0}
.mtab:hover{color:var(--text-mid)}
.mtab.active{color:var(--gold-light);border-bottom-color:var(--gold)}
.tab-hint{font-size:.68rem;color:var(--text-dim);padding:14px 8px;white-space:nowrap;flex-shrink:0;align-self:center;opacity:.5}

/* CONTROLS */
.controls{padding:10px 12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:45px;z-index:19}
.search-wrap{flex:1;min-width:140px;position:relative}
.search-wrap input{width:100%;padding:9px 10px 9px 32px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;width:100%;align-items:center}
.ctrl-select{padding:9px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.82rem;cursor:pointer}
.count-info{color:var(--text-dim);font-size:.75rem;margin-left:auto;white-space:nowrap}

/* GRID */
.grid{display:grid;grid-template-columns:1fr;gap:10px;padding:12px}
@media(min-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.grid{grid-template-columns:repeat(3,1fr)}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:border-color .15s}
.card:hover{border-color:var(--border-light)}

/* card top: rank number + score bubble + info */
.card-top{padding:14px 16px 12px;display:flex;gap:12px;align-items:flex-start}
.rank-num{flex-shrink:0;width:26px;font-size:.78rem;color:var(--text-dim);text-align:right;padding-top:5px;font-weight:600}
.score-bubble{flex-shrink:0;width:58px;text-align:center;background:var(--surface2);border-radius:10px;padding:8px 4px 6px;border:1px solid var(--border)}
.score-bubble .num{font-size:1.6rem;font-weight:700;line-height:1}
.score-bubble .denom{font-size:.62rem;color:var(--text-dim)}
.score-bubble .letter{font-size:.9rem;font-weight:700;margin-top:3px}
.card-info{flex:1;min-width:0}
.whiskey-name{font-size:1.08rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:8px}
.whiskey-name a{color:inherit;text-decoration:none}
.whiskey-name a:hover{color:var(--gold-light)}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:.74rem;padding:3px 9px;border-radius:20px;border:1px solid;white-space:nowrap}
.tag-type{color:var(--amber);border-color:rgba(212,136,42,.35);background:rgba(212,136,42,.08)}
.tag-member{color:var(--blue);border-color:rgba(96,144,184,.35);background:rgba(96,144,184,.08)}
.tag-season{color:var(--text-dim);border-color:var(--border);background:transparent}
.tag-price{color:var(--green);border-color:rgba(90,158,111,.35);background:rgba(90,158,111,.08)}
.tag-proof{color:var(--text-dim);border-color:var(--border);background:transparent}

/* SPOTLIGHT: when a member tab is active, show their score big */
.spotlight{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(200,146,42,.06)}
.spotlight-grade{font-size:2.2rem;font-weight:700;line-height:1;min-width:48px;text-align:center}
.spotlight-score{font-size:.9rem;color:var(--text-mid);font-weight:600}
.spotlight-label{font-size:.74rem;color:var(--text-dim)}

/* MEMBER SCORES ROW */
.scores-row{padding:10px 16px;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.sc{text-align:center}
.sc-name{font-size:.68rem;color:var(--text-dim);margin-bottom:3px;letter-spacing:.02em}
.sc-grade{font-size:.95rem;font-weight:700}
.sc-num{font-size:.68rem;color:var(--text-dim);margin-top:2px}
.bar-wrap{height:4px;background:var(--bg);border-radius:2px;margin:3px 0;overflow:hidden}
.bar{height:100%;border-radius:2px}

/* grade colors */
.gAplus,.gA,.gAminus{color:#f0c040}
.gBplus,.gB,.gBminus{color:#80c060}
.gCplus,.gC,.gCminus{color:#c8b040}
.gDplus,.gD,.gDminus{color:#d08040}
.gF{color:#c04040}
.gNone{color:var(--border-light)}

/* QUOTE */
.quote{padding:10px 16px;border-top:1px solid var(--border);font-size:.82rem;color:var(--text-mid);font-style:italic;line-height:1.5}

/* CARD FOOTER */
.card-footer{padding:8px 12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.btn-score{padding:7px 16px;background:var(--surface2);border:1px solid var(--border-light);border-radius:6px;color:var(--text-mid);font-size:.8rem;cursor:pointer;font-weight:600;transition:background .15s}
.btn-score:hover{background:var(--border);color:var(--text)}

/* FAB */
.fab{position:fixed;bottom:20px;right:16px;width:54px;height:54px;background:var(--gold);border:none;border-radius:50%;color:#1a1000;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 16px rgba(200,146,42,.5);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s,background .15s}
.fab:hover{background:var(--gold-light);transform:scale(1.05)}
.fab:active{transform:scale(.95)}

/* EXPORT BAR */
.export-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}
.btn-export{padding:6px 14px;background:transparent;border:1px solid var(--border-light);border-radius:6px;color:var(--text-dim);font-size:.75rem;cursor:pointer;transition:background .15s}
.btn-export:hover{background:var(--border)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end}
.overlay.open{display:flex}
@media(min-width:600px){.overlay{align-items:center;justify-content:center;padding:20px}}
.modal{background:var(--surface);border:1px solid var(--border-light);border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 32px;box-shadow:0 -8px 40px rgba(0,0,0,.6)}
@media(min-width:600px){.modal{border-radius:var(--radius);max-width:480px;padding:24px 24px 28px}}
.modal-handle{width:40px;height:4px;background:var(--border-light);border-radius:2px;margin:0 auto 16px}
@media(min-width:600px){.modal-handle{display:none}}
.modal h2{font-size:1.1rem;color:var(--gold-light);margin-bottom:16px;font-weight:700}
.modal-subtitle{font-size:.82rem;color:var(--text-dim);margin-top:-10px;margin-bottom:16px}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border-light);border-radius:8px;color:var(--text);font-size:.88rem;font-family:inherit}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold-dim)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* SCORE ENTRY */
.score-entries{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.score-entry{display:grid;grid-template-columns:80px 1fr;align-items:center;gap:10px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.score-entry .mem-name{font-size:.85rem;font-weight:600;color:var(--text-mid)}
.grade-select{padding:8px 10px;background:var(--surface2);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-size:.85rem;width:100%}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer}
.btn:active{opacity:.8}
.btn-primary{background:var(--gold);color:#1a1000}
.btn-secondary{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border-light)}
.btn-danger{background:#6b2020;color:#f0a0a0;border:1px solid #8b3030}

/* MISC */
.no-results{text-align:center;padding:50px 20px;color:var(--text-dim);font-style:italic;grid-column:1/-1}
.custom-badge{display:inline-block;font-size:.62rem;padding:1px 5px;background:rgba(200,146,42,.2);color:var(--gold-dim);border-radius:4px;margin-left:4px;vertical-align:middle}
input::placeholder{color:var(--text-dim)}
</style>
</head>
<body>

<div class="header">
  <svg class="header-logo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="GFWB logo">
    <defs>
      <path id="ta" d="M100,100 m-78,0 a78,78 0 0,1 156,0"/>
      <path id="tb" d="M100,100 m-64,0 a64,64 0 0,0 128,0"/>
    </defs>

    <circle cx="100" cy="100" r="88" fill="none" stroke="#1a0a00" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#1a0a00" stroke-width="1"/>

    </text>
    <text font-family="Georgia,serif" font-weight="700" font-size="13.5" fill="#1a0a00" letter-spacing="3">
      <textPath href="#tb" startOffset="50%" text-anchor="middle">WHISKEY BOYS</textPath>
    </text>
    <text x="100" y="90" font-family="Georgia,serif" font-weight="700" font-size="44" fill="#1a0a00" text-anchor="middle" dominant-baseline="auto">GF</text>
    <text x="100" y="133" font-family="Georgia,serif" font-weight="700" font-size="44" fill="#1a0a00" text-anchor="middle" dominant-baseline="auto">WB</text>
    <line x1="22" y1="103" x2="46" y2="103" stroke="#1a0a00" stroke-width="1.2"/>
    <line x1="154" y1="103" x2="178" y2="103" stroke="#1a0a00" stroke-width="1.2"/>
    <circle cx="34" cy="97" r="2.5" fill="#1a0a00"/>
    <circle cx="166" cy="97" r="2.5" fill="#1a0a00"/>
  </svg>
  <div class="header-text">
    <h1>Good Friday Whiskey Boys</h1>
    <p>Rankings &amp; Reviews</p>
  </div>
</div>

<div class="export-bar">
  <span id="saveStatus" style="font-size:.74rem;min-width:80px"></span>
  <button class="btn-export" onclick="exportData()">⬇ Export</button>
  <button class="btn-export" onclick="importClick()">⬆ Import</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<!-- member tabs: tap a name to sort by their ratings -->
<div class="member-tabs" id="memberTabs">
  <div class="mtab active" data-msort="" onclick="setMemberSort(this,'')">All</div>
  <div class="mtab" data-msort="scoreJon" onclick="setMemberSort(this,'scoreJon')">Jonathan</div>
  <div class="mtab" data-msort="scoreKev" onclick="setMemberSort(this,'scoreKev')">Kbone</div>
  <div class="mtab" data-msort="scoreToph" onclick="setMemberSort(this,'scoreToph')">Topher</div>
  <div class="mtab" data-msort="scoreMcK" onclick="setMemberSort(this,'scoreMcK')">McK</div>
  <div class="mtab" data-msort="scoreCon" onclick="setMemberSort(this,'scoreCon')">Connor</div>
  <span class="tab-hint">← tap to sort by their ratings</span>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search whiskey, quote…" oninput="render()">
  </div>
  <div class="ctrl-row">
    <select class="ctrl-select" id="filterType" onchange="render()">
      <option value="">All Types</option>
    </select>
    <select class="ctrl-select" id="filterYear" onchange="render()">
      <option value="">All Years</option>
    </select>
    <select class="ctrl-select" id="filterMember" onchange="render()">
      <option value="">All Members</option>
      <option>Jonathan</option><option>Kbone</option><option>Topher</option>
      <option>McK</option><option>Connor</option>
    </select>
    <select class="ctrl-select" id="sortBy" onchange="render()">
      <option value="scoreAvg-desc">Best Avg First</option>
      <option value="scoreAvg-asc">Worst Avg First</option>
      <option value="name-asc">Name A–Z</option>
      <option value="price-asc">Price ↑</option>
      <option value="price-desc">Price ↓</option>
      <option value="year-desc">Newest First</option>
      <option value="year-asc">Oldest First</option>
    </select>
    <span class="count-info" id="countInfo"></span>
  </div>
</div>

<div class="grid" id="grid"></div>
<button class="fab" onclick="openAddModal()" title="Add Whiskey">+</button>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="addOverlay" onclick="maybeClose(event,'addOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="addModalTitle">Add Whiskey</h2>
    <input type="hidden" id="editId">
    <div class="field"><label>Whiskey Name *</label><input type="text" id="fName" placeholder="e.g. Redbreast 12"></div>
    <div class="field-row">
      <div class="field"><label>Brought by</label>
        <select id="fMember"><option>Jonathan</option><option>Kbone</option><option>Topher</option><option selected>McK</option><option>Connor</option><option>Mattison</option></select>
      </div>
      <div class="field"><label>Type</label><input type="text" id="fType" list="typeList" placeholder="e.g. Bourbon"><datalist id="typeList"></datalist></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Year</label><input type="number" id="fYear" min="2020" max="2035"></div>
      <div class="field"><label>Quarter</label><select id="fQuarter"><option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Price ($)</label><input type="text" id="fPrice" placeholder="75"></div>
      <div class="field"><label>Proof</label><input type="text" id="fProof" placeholder="90"></div>
    </div>
    <div class="field"><label>Link (optional)</label><input type="url" id="fLink" placeholder="https://…"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('addOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveWhiskey()">Next: Add Scores →</button>
    </div>
    <div id="editDeleteRow" style="display:none;margin-top:10px">
      <button class="btn btn-danger" style="width:100%" onclick="deleteEntry()">Delete This Entry</button>
    </div>
  </div>
</div>

<!-- SCORE MODAL -->
<div class="overlay" id="scoreOverlay" onclick="maybeClose(event,'scoreOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="scoreModalTitle">Score Whiskey</h2>
    <div class="modal-subtitle" id="scoreModalSub"></div>
    <input type="hidden" id="scoreTargetId">
    <div class="score-entries" id="scoreEntries"></div>
    <div class="field"><label>Key Quote (optional)</label><textarea id="fQuote" placeholder="Best line of the night…"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('scoreOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveScores()">Save Scores</button>
    </div>
  </div>
</div>

};
</script>

// ── STATE ────────────────────────────────────────────────────────────────────
let serverEntries = []; // all entries — loaded from server, source of truth
let activeMemberSort = '';

async function loadCustom(){
  try{
    const res = await fetch('/api/data');
    if(res.ok){ const d=await res.json(); serverEntries=d.entries||BASE; }
    else { serverEntries=[...BASE]; }
  }catch(e){ serverEntries=[...BASE]; }
}

let _saveTimer=null;
function scheduleSave(){
  clearTimeout(_saveTimer);
  setSaveStatus('saving');
  _saveTimer=setTimeout(pushData,600);
}
async function pushData(){
  try{
    const res=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entries:serverEntries})});
    setSaveStatus(res.ok?'saved':'error');
  }catch(e){ setSaveStatus('error'); }
}
function setSaveStatus(s){
  const el=document.getElementById('saveStatus');
  if(!el) return;
  el.textContent = s==='saving'?'Saving…':s==='saved'?'✓ Saved':'⚠ Save failed';
  el.style.color = s==='error'?'#c04040':s==='saved'?'var(--green)':'var(--text-dim)';
  if(s==='saved') setTimeout(()=>{ el.textContent=''; },2500);
}

function save(){ scheduleSave(); }
function getAllData(){ return serverEntries; }

// persist filter/sort state
function saveUIState(){
  const s={search:document.getElementById('search').value,filterType:document.getElementById('filterType').value,filterYear:document.getElementById('filterYear').value,filterMember:document.getElementById('filterMember').value,sortBy:document.getElementById('sortBy').value,memberSort:activeMemberSort};
  localStorage.setItem('gfwc_ui',JSON.stringify(s));
}
function restoreUIState(){
  try{
    const s=JSON.parse(localStorage.getItem('gfwc_ui')||'{}');
    if(s.search) document.getElementById('search').value=s.search;
    if(s.filterType) document.getElementById('filterType').value=s.filterType;
    if(s.filterYear) document.getElementById('filterYear').value=s.filterYear;
    if(s.filterMember) document.getElementById('filterMember').value=s.filterMember;
    if(s.sortBy) document.getElementById('sortBy').value=s.sortBy;
    if(s.memberSort){
      activeMemberSort=s.memberSort;
      document.querySelectorAll('.mtab').forEach(t=>{
        if(t.dataset.msort===s.memberSort) t.classList.add('active');
        else t.classList.remove('active');
      });
    }
  }catch(e){}
}

function normMember(m){
  const lc=(m||'').toLowerCase();
  if(lc==='kbone'||lc==='kev') return 'Kbone';
  if(lc==='jonathan'||lc==='jon') return 'Jonathan';
  if(lc==='topher'||lc==='toph') return 'Topher';
  if(lc==='mck') return 'McK';
  if(lc==='connor'||lc==='con') return 'Connor';
  if(lc==='mattison') return 'Kbone';
  return m;
}

let _auth = false;
function requireAuth(fn) {
  if (_auth) { fn(); return; }
  const pw = prompt('Password:');
  if (pw === 'jesuschrist') { _auth = true; fn(); }
  else if (pw !== null) alert('Wrong password.');
}

// ── MEMBER TABS ───────────────────────────────────────────────────────────────
function setMemberSort(el, sk){
  activeMemberSort = sk;
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(sk) document.getElementById('sortBy').value='scoreAvg-desc';
  saveUIState();
  render();
}

// ── GRADE HELPERS ─────────────────────────────────────────────────────────────
function gradeClass(g){
  if(!g) return 'gNone';
  const m={'A+':'Aplus','A':'A','A-':'Aminus','B+':'Bplus','B':'B','B-':'Bminus','C+':'Cplus','C':'C','C-':'Cminus','D+':'Dplus','D':'D','D-':'Dminus','F':'F'};
  return 'g'+(m[g]||'None');
}
function barColor(s){
  if(s>=8.5) return '#f0c040';
  if(s>=7)   return '#a0d070';
  if(s>=5.5) return '#80b850';
  if(s>=4)   return '#c8b040';
  if(s>=2.5) return '#d08040';
  return '#c04040';
}
function sn(v){ return (v===null||v===undefined||v==='') ? null : parseFloat(v)||0; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const type=document.getElementById('filterType').value;
  const year=document.getElementById('filterYear').value;
  const member=document.getElementById('filterMember').value;
  const sortSel=document.getElementById('sortBy').value;
  const [sk,sd]=sortSel.split('-');

  // member tab sets default sort to their score; dropdown overrides when user picks something else
  const effectiveSortKey = (sk === 'scoreAvg' && activeMemberSort) ? activeMemberSort : sk;
  const effectiveSortDir = sd;

  let items=getAllData().map(d=>({
    ...d,
    member:normMember(d.member),
    _avg:sn(d.scoreAvg)??0,
  })).filter(d=>{
    if(member && d.member!==member) return false;
    if(type && d.type!==type) return false;
    if(year && String(d.year)!==String(year)) return false;
    if(q){
      const hay=[d.whiskey,d.member,d.type,d.quotes,d.gradeAvg,d.quarter,String(d.year)].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  items.sort((a,b)=>{
    let av,bv;
    if(effectiveSortKey==='scoreAvg'||!effectiveSortKey){ av=a._avg; bv=b._avg; }
    else if(effectiveSortKey==='name'){ av=a.whiskey.toLowerCase(); bv=b.whiskey.toLowerCase(); }
    else if(effectiveSortKey==='price'){ av=parseFloat(a.price)||0; bv=parseFloat(b.price)||0; }
    else if(effectiveSortKey==='year'){ av=a.year*10+parseInt((a.quarter||'Q0').slice(1)); bv=b.year*10+parseInt((b.quarter||'Q0').slice(1)); }
    else{ // member score key like 'scoreJon'
      av=sn(a[effectiveSortKey])??-1;
      bv=sn(b[effectiveSortKey])??-1;
    }
    return effectiveSortDir==='asc'?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });

  return items;
}

function renderCard(d, rank){
  const avg=d._avg;
  const avgLetter=d.gradeAvg||scoreToLetter(avg);
  const bc=barColor(avg);
  const isCustom=d.id&&d.id.startsWith('c');

  // when a member tab is active, spotlight their personal score
  let spotlightHtml='';
  if(activeMemberSort){
    const mem=MEMBERS.find(m=>m.sk===activeMemberSort);
    if(mem){
      const grade=d[mem.gk]||'';
      const score=sn(d[mem.sk]);
      const sc=barColor(score??0);
      spotlightHtml=`<div class="spotlight">
        <div class="spotlight-grade ${gradeClass(grade)}" style="color:${sc}">${grade||'—'}</div>
        <div>
          <div class="spotlight-score" style="color:${sc}">${score!==null?score.toFixed(1):'—'}<span style="font-size:.7rem;color:var(--text-dim)">/10</span></div>
          <div class="spotlight-label">${mem.label}'s score</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:.72rem;color:var(--text-dim)">avg</div>
          <div style="font-size:.88rem;font-weight:600;color:${bc}">${avg.toFixed(1)}</div>
        </div>
      </div>`;
    }
  }

  const scoresHtml=MEMBERS.map(m=>{
    const grade=d[m.gk]||'';
    const score=sn(d[m.sk]);
    const active=activeMemberSort===m.sk;
    const barW=score!==null?Math.round((score/10)*100):0;
    return `<div class="sc" style="${active?'opacity:1':'opacity:.7'}">
      <div class="sc-name" style="${active?'color:var(--text-mid);font-weight:700':''}">${m.label}</div>
      <div class="sc-grade ${gradeClass(grade)}">${grade||'—'}</div>
      <div class="bar-wrap"><div class="bar" style="width:${barW}%;background:${bc}"></div></div>
      <div class="sc-num">${score!==null?score.toFixed(1):'—'}</div>
    </div>`;
  }).join('');

  const nameHtml=d.link?`<a href="${esc(d.link)}" target="_blank" rel="noopener">${esc(d.whiskey)}</a>`:esc(d.whiskey);
  const priceDisp=d.price==='???'?'???':parseFloat(d.price)?'$'+Math.round(parseFloat(d.price)):'';
  const proofDisp=d.proof&&d.proof!=='???'&&parseFloat(d.proof)?parseFloat(d.proof)+'° proof':'';

  const tags=[
    d.type?`<span class="tag tag-type">${esc(d.type)}</span>`:'',
    `<span class="tag tag-member">by ${esc(d.member)}</span>`,
    `<span class="tag tag-season">${esc(d.quarter)} ${d.year}</span>`,
    priceDisp?`<span class="tag tag-price">${priceDisp}</span>`:'',
    proofDisp?`<span class="tag tag-proof">${proofDisp}</span>`:'',
  ].filter(Boolean).join('');

  const quoteHtml=d.quotes&&typeof d.quotes==='string'&&d.quotes.trim()
    ?`<div class="quote">${esc(d.quotes)}</div>`:'';

  return `<div class="card" id="card-${d.id}">
    <div class="card-top">
      <div class="rank-num">${rank}</div>
      <div class="score-bubble">
        <div class="num" style="color:${bc}">${avg.toFixed(1)}</div>
        <div class="denom">/10</div>
        <div class="letter" style="color:${bc}">${avgLetter}</div>
      </div>
      <div class="card-info">
        <div class="whiskey-name">${nameHtml}${isCustom?'<span class="custom-badge">new</span>':''}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
    ${spotlightHtml}
    <div class="scores-row">${scoresHtml}</div>
    ${quoteHtml}
    <div class="card-footer">
      ${isCustom?`<button class="btn-score" style="margin-right:auto" onclick="openEditModal('${d.id}')">✏ Edit</button>`:''}
      <button class="btn-score" onclick="openScoreModal('${d.id}')">📝 Score</button>
    </div>
  </div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(){
  const items=getFiltered();
  const total=getAllData().length;
  const label=activeMemberSort?`Sorted by ${MEMBER_SORT_LABEL[activeMemberSort]}'s ratings · `:'';
  document.getElementById('countInfo').textContent=`${label}${items.length} of ${total}`;
  const grid=document.getElementById('grid');
  if(!items.length){ grid.innerHTML='<div class="no-results">No whiskies match your search.</div>'; return; }
  grid.innerHTML=items.map((d,i)=>renderCard(d,i+1)).join('');
}

function openEditModal(id){ requireAuth(()=>_openEditModal(id)); }
function _openEditModal(id){
  const d=serverEntries.find(e=>e.id===id); if(!d) return;

  document.getElementById('editId').value=id;

  document.getElementById('fProof').value=d.proof||'';
  document.getElementById('fLink').value=d.link||'';

function saveWhiskey(){
  const name=document.getElementById('fName').value.trim();
  if(!name){ document.getElementById('fName').focus(); return; }
  const editId=document.getElementById('editId').value;
  const entry={
    id:editId||'c'+Date.now(),
    year:parseInt(document.getElementById('fYear').value)||new Date().getFullYear(),
    quarter:document.getElementById('fQuarter').value,
    member:document.getElementById('fMember').value,
    whiskey:name, price:document.getElementById('fPrice').value.trim(),
    proof:document.getElementById('fProof').value.trim(),
    type:document.getElementById('fType').value.trim(),
    link:document.getElementById('fLink').value.trim(),
    gradeJon:'',gradeKev:'',gradeToph:'',gradeMcK:'',gradeCon:'',gradeAvg:'',
    scoreJon:null,scoreKev:null,scoreToph:null,scoreMcK:null,scoreCon:null,scoreAvg:0,quotes:'',
  };
  if(editId){
    const idx=serverEntries.findIndex(e=>e.id===editId);
    if(idx>=0){ const ex=serverEntries[idx]; Object.assign(entry,{gradeJon:ex.gradeJon,gradeKev:ex.gradeKev,gradeToph:ex.gradeToph,gradeMcK:ex.gradeMcK,gradeCon:ex.gradeCon,gradeAvg:ex.gradeAvg,scoreJon:ex.scoreJon,scoreKev:ex.scoreKev,scoreToph:ex.scoreToph,scoreMcK:ex.scoreMcK,scoreCon:ex.scoreCon,scoreAvg:ex.scoreAvg,quotes:ex.quotes}); serverEntries[idx]=entry; }
  } else { serverEntries.push(entry); }
  save(); closeModal('addOverlay'); render(); openScoreModal(entry.id);
}
function deleteEntry(){
  const id=document.getElementById('editId').value; if(!id) return;
  if(!confirm('Delete this entry?')) return;
  serverEntries=serverEntries.filter(e=>e.id!==id); save(); closeModal('addOverlay'); render();
}

// ── SCORE MODAL ───────────────────────────────────────────────────────────────
function openScoreModal(id){ requireAuth(()=>_openScoreModal(id)); }
function _openScoreModal(id){
  const d=getAllData().find(e=>e.id===id); if(!d) return;
  document.getElementById('scoreTargetId').value=id;
  document.getElementById('scoreModalTitle').textContent=d.whiskey;
  document.getElementById('scoreModalSub').textContent=`${d.quarter} ${d.year} · Brought by ${normMember(d.member)}`;
  document.getElementById('fQuote').value=d.quotes||'';
  document.getElementById('scoreEntries').innerHTML=MEMBERS.map(m=>{
    const cur=d[m.gk]||'';
    const opts=['',  ...GRADES].map(g=>`<option value="${g}" ${g===cur?'selected':''}>${g||'— not scored'}</option>`).join('');
    return `<div class="score-entry"><span class="mem-name">${m.label}</span><select class="grade-select" id="sg-${m.key}">${opts}</select></div>`;
  }).join('');
  openModal('scoreOverlay');
}
function saveScores(){
  const id=document.getElementById('scoreTargetId').value;
  const quote=document.getElementById('fQuote').value.trim();
  const grades={}, scores={};
  MEMBERS.forEach(m=>{ const g=document.getElementById('sg-'+m.key).value; grades[m.gk]=g; scores[m.sk]=g&&GRADE_SCORE[g]!==undefined?GRADE_SCORE[g]:null; });
  const vals=Object.values(scores).filter(v=>v!==null);
  const avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  const update={...grades,...scores,gradeAvg:scoreToLetter(avg),scoreAvg:avg,quotes:quote};
  const ci=serverEntries.findIndex(e=>e.id===id);
  if(ci>=0){ serverEntries[ci]={...serverEntries[ci],...update}; }
  save(); closeModal('scoreOverlay'); render();
}

function openModal(id){ document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function maybeClose(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal('addOverlay'); closeModal('scoreOverlay'); } });

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),entries:serverEntries},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='gfwc-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importClick(){ document.getElementById('importFile').click(); }
async function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ try{
    const data=JSON.parse(ev.target.result);
    const entries=data.entries||data;
    if(!Array.isArray(entries)) throw new Error('bad format');
    if(!confirm(`Import ${entries.length} entries? This replaces current custom entries.`)) return;
    serverEntries=entries; await pushData(); render(); alert('Imported!');
  }catch(err){alert('Import failed: '+err.message);} };
  r.readAsText(file); e.target.value='';
}

(async()=>{
  try {
    document.getElementById('grid').innerHTML='<div style="padding:2rem;color:var(--text-dim)">Loading...</div>';

    restoreUIState();
    render();
    ['search','filterType','filterYear','filterMember','sortBy'].forEach(id=>{
      document.getElementById(id).addEventListener('change',saveUIState);
      document.getElementById(id).addEventListener('input',saveUIState);
    });

    document.getElementById('grid').innerHTML=`<div style="padding:2rem;color:#c04040">Error loading data: ${err.message}<br><pre>${err.stack}</pre></div>`;
  }
})();
