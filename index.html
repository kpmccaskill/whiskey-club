<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Good Friday Whiskey Club</title>
<style>
:root {
  --bg: #141009;
  --surface: #1e1609;
  --surface2: #2a1e0e;
  --border: #3d2e18;
  --border-light: #4f3c22;
  --gold: #c8922a;
  --gold-light: #e0b050;
  --gold-dim: #8a6020;
  --text: #f0e8d8;
  --text-dim: #9a8060;
  --text-mid: #c4a880;
  --green: #5a9e6f;
  --amber: #d4882a;
  --red: #b83c3c;
  --blue: #6090b8;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{
  background:linear-gradient(180deg,#1e1406 0%,#141009 100%);
  border-bottom:1px solid var(--border);
  padding:20px 16px 14px;
  text-align:center;
}
.header h1{font-size:1.5rem;color:var(--gold-light);letter-spacing:.04em;font-weight:700}
.header p{color:var(--text-dim);font-size:.8rem;margin-top:4px}

/* MEMBER TABS */
.member-tabs{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 8px;
  display:flex;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  gap:4px;
  position:sticky;
  top:0;
  z-index:20;
}
.member-tabs::-webkit-scrollbar{display:none}
.mtab{
  padding:12px 14px;
  font-size:.82rem;
  font-weight:600;
  color:var(--text-dim);
  cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;
  transition:color .15s,border-color .15s;
  user-select:none;
}
.mtab:hover{color:var(--text-mid)}
.mtab.active{color:var(--gold-light);border-bottom-color:var(--gold)}
.mtab .count{
  display:inline-block;
  background:var(--surface2);
  color:var(--text-dim);
  font-size:.68rem;
  padding:1px 5px;
  border-radius:8px;
  margin-left:4px;
  vertical-align:middle;
}
.mtab.active .count{background:var(--gold-dim);color:var(--gold-light)}

/* CONTROLS */
.controls{
  padding:10px 12px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:44px;
  z-index:19;
}
.search-wrap{flex:1;min-width:140px;position:relative}
.search-wrap input{
  width:100%;
  padding:9px 10px 9px 32px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:.85rem;
}
.search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.8rem;pointer-events:none}
.ctrl-select{
  padding:9px 10px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-size:.82rem;
  cursor:pointer;
  max-width:140px;
}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;width:100%;align-items:center}
.ctrl-label{color:var(--text-dim);font-size:.75rem;white-space:nowrap}
.count-info{color:var(--text-dim);font-size:.75rem;margin-left:auto;white-space:nowrap}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  padding:12px;
}
@media(min-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:960px){.grid{grid-template-columns:repeat(3,1fr)}}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
  transition:border-color .15s;
}
.card:hover{border-color:var(--border-light)}

.card-top{padding:12px 14px 10px;display:flex;gap:10px;align-items:flex-start}
.score-bubble{
  flex-shrink:0;
  width:50px;
  text-align:center;
  background:var(--surface2);
  border-radius:8px;
  padding:6px 4px;
  border:1px solid var(--border);
}
.score-bubble .num{font-size:1.4rem;font-weight:700;line-height:1}
.score-bubble .denom{font-size:.6rem;color:var(--text-dim)}
.score-bubble .letter{font-size:.8rem;font-weight:600;margin-top:2px}

.card-info{flex:1;min-width:0}
.whiskey-name{
  font-size:.98rem;
  font-weight:700;
  color:var(--text);
  line-height:1.3;
  margin-bottom:6px;
}
.whiskey-name a{color:inherit;text-decoration:none}
.whiskey-name a:hover{color:var(--gold-light)}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{
  font-size:.72rem;
  padding:2px 8px;
  border-radius:20px;
  border:1px solid;
  white-space:nowrap;
}
.tag-type{color:var(--amber);border-color:rgba(212,136,42,.35);background:rgba(212,136,42,.08)}
.tag-member{color:var(--blue);border-color:rgba(96,144,184,.35);background:rgba(96,144,184,.08)}
.tag-season{color:var(--text-dim);border-color:var(--border);background:transparent}
.tag-price{color:var(--green);border-color:rgba(90,158,111,.35);background:rgba(90,158,111,.08)}
.tag-proof{color:var(--text-dim);border-color:var(--border);background:transparent}

/* MEMBER SCORES */
.scores-row{
  padding:8px 14px;
  border-top:1px solid var(--border);
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
}
.sc{text-align:center}
.sc-name{font-size:.65rem;color:var(--text-dim);margin-bottom:2px}
.sc-grade{font-size:.88rem;font-weight:700}
.sc-num{font-size:.65rem;color:var(--text-dim);margin-top:1px}
.bar-wrap{height:3px;background:var(--bg);border-radius:2px;margin:2px 0;overflow:hidden}
.bar{height:100%;border-radius:2px}

/* Grade colors */
.gA-plus,.gA,.gA-minus{color:#f0c040}
.gB-plus,.gB,.gB-minus{color:#80c060}
.gC-plus,.gC,.gC-minus{color:#c8b040}
.gD-plus,.gD,.gD-minus{color:#d08040}
.gF{color:#c04040}
.gNone{color:var(--border-light)}

/* QUOTE */
.quote{
  padding:8px 14px;
  border-top:1px solid var(--border);
  font-size:.78rem;
  color:var(--text-dim);
  font-style:italic;
  line-height:1.45;
}

/* CARD FOOTER (score button) */
.card-footer{
  padding:8px 14px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:flex-end;
}
.btn-score{
  padding:6px 14px;
  background:var(--surface2);
  border:1px solid var(--border-light);
  border-radius:6px;
  color:var(--text-mid);
  font-size:.78rem;
  cursor:pointer;
  font-weight:600;
  transition:background .15s,color .15s;
}
.btn-score:hover{background:var(--border);color:var(--text)}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  right:16px;
  width:54px;height:54px;
  background:var(--gold);
  border:none;
  border-radius:50%;
  color:#1a1000;
  font-size:1.5rem;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(200,146,42,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
  transition:transform .15s,background .15s;
}
.fab:hover{background:var(--gold-light);transform:scale(1.05)}
.fab:active{transform:scale(.95)}

/* MODAL */
.overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  z-index:200;
  align-items:flex-end;
  padding:0;
}
.overlay.open{display:flex}
@media(min-width:600px){.overlay{align-items:center;justify-content:center;padding:20px}}
.modal{
  background:var(--surface);
  border:1px solid var(--border-light);
  border-radius:16px 16px 0 0;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  padding:20px 16px 32px;
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
@media(min-width:600px){.modal{border-radius:var(--radius);max-width:480px;max-height:85vh;padding:24px 24px 28px}}
.modal-handle{
  width:40px;height:4px;background:var(--border-light);border-radius:2px;margin:0 auto 16px;
}
@media(min-width:600px){.modal-handle{display:none}}
.modal h2{font-size:1.1rem;color:var(--gold-light);margin-bottom:16px;font-weight:700}
.modal-subtitle{font-size:.82rem;color:var(--text-dim);margin-top:-10px;margin-bottom:16px}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;color:var(--text-dim);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{
  width:100%;
  padding:10px 12px;
  background:var(--bg);
  border:1px solid var(--border-light);
  border-radius:8px;
  color:var(--text);
  font-size:.88rem;
}
.field textarea{resize:vertical;min-height:60px;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--gold-dim);
}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* SCORE ENTRY */
.score-entries{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.score-entry{
  display:grid;
  grid-template-columns:80px 1fr;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
}
.score-entry .mem-name{font-size:.85rem;font-weight:600;color:var(--text-mid)}
.grade-select{
  padding:8px 10px;
  background:var(--surface2);
  border:1px solid var(--border-light);
  border-radius:6px;
  color:var(--text);
  font-size:.85rem;
  width:100%;
}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{
  flex:1;padding:12px;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .15s;
}
.btn:active{opacity:.8}
.btn-primary{background:var(--gold);color:#1a1000}
.btn-secondary{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border-light)}
.btn-danger{background:#6b2020;color:#f0a0a0;border:1px solid #8b3030}

/* EXPORT BAR */
.export-bar{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:8px 12px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
.btn-export{
  padding:6px 14px;background:transparent;border:1px solid var(--border-light);
  border-radius:6px;color:var(--text-dim);font-size:.75rem;cursor:pointer;
  transition:background .15s;
}
.btn-export:hover{background:var(--border)}

/* NO RESULTS */
.no-results{
  text-align:center;padding:50px 20px;color:var(--text-dim);
  font-style:italic;grid-column:1/-1;
}

/* CUSTOM BADGE */
.custom-badge{
  display:inline-block;font-size:.62rem;padding:1px 5px;
  background:rgba(200,146,42,.2);color:var(--gold-dim);
  border-radius:4px;margin-left:4px;vertical-align:middle;
}

input:focus,select:focus{outline:none}
input::placeholder{color:var(--text-dim)}
</style>
</head>
<body>

<div class="header">
  <h1>🥃 Good Friday Whiskey Club</h1>
  <p>Rankings & Reviews</p>
</div>

<div class="export-bar">
  <span style="font-size:.74rem;color:var(--text-dim)">Custom entries saved in browser</span>
  <button class="btn-export" onclick="exportData()">⬇ Export JSON</button>
  <button class="btn-export" onclick="importClick()">⬆ Import JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<div class="member-tabs" id="memberTabs">
  <div class="mtab active" data-member="" onclick="setMember(this,'')">All <span class="count" id="cnt-all"></span></div>
  <div class="mtab" data-member="Jonathan" onclick="setMember(this,'Jonathan')">Jonathan <span class="count" id="cnt-Jonathan"></span></div>
  <div class="mtab" data-member="Kbone" onclick="setMember(this,'Kbone')">Kbone <span class="count" id="cnt-Kbone"></span></div>
  <div class="mtab" data-member="Topher" onclick="setMember(this,'Topher')">Topher <span class="count" id="cnt-Topher"></span></div>
  <div class="mtab" data-member="McK" onclick="setMember(this,'McK')">McK <span class="count" id="cnt-McK"></span></div>
  <div class="mtab" data-member="Connor" onclick="setMember(this,'Connor')">Connor <span class="count" id="cnt-Connor"></span></div>
  <div class="mtab" data-member="Mattison" onclick="setMember(this,'Mattison')">Mattison <span class="count" id="cnt-Mattison"></span></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Search whiskey, quote…" oninput="render()">
  </div>
  <div class="ctrl-row">
    <select class="ctrl-select" id="filterType" onchange="render()">
      <option value="">All Types</option>
    </select>
    <select class="ctrl-select" id="filterYear" onchange="render()">
      <option value="">All Years</option>
    </select>
    <select class="ctrl-select" id="sortBy" onchange="render()">
      <option value="scoreAvg-desc">Best First</option>
      <option value="scoreAvg-asc">Worst First</option>
      <option value="name-asc">Name A–Z</option>
      <option value="price-asc">Price ↑</option>
      <option value="price-desc">Price ↓</option>
      <option value="year-desc">Newest First</option>
      <option value="year-asc">Oldest First</option>
      <option value="scoreJon-desc">Jon's Faves</option>
      <option value="scoreKev-desc">Kbone's Faves</option>
      <option value="scoreToph-desc">Topher's Faves</option>
      <option value="scoreMcK-desc">McK's Faves</option>
      <option value="scoreCon-desc">Connor's Faves</option>
    </select>
    <span class="count-info" id="countInfo"></span>
  </div>
</div>

<div class="grid" id="grid"></div>

<button class="fab" onclick="openAddModal()" title="Add Whiskey">+</button>

<!-- ADD/EDIT WHISKEY MODAL -->
<div class="overlay" id="addOverlay" onclick="maybeClose(event,'addOverlay')">
  <div class="modal" id="addModal">
    <div class="modal-handle"></div>
    <h2 id="addModalTitle">Add Whiskey</h2>
    <input type="hidden" id="editId">
    <div class="field">
      <label>Whiskey Name *</label>
      <input type="text" id="fName" placeholder="e.g. Redbreast 12">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Brought by</label>
        <select id="fMember">
          <option value="Jonathan">Jonathan</option>
          <option value="Kbone">Kbone</option>
          <option value="Topher">Topher</option>
          <option value="McK">McK</option>
          <option value="Connor">Connor</option>
          <option value="Mattison">Mattison</option>
        </select>
      </div>
      <div class="field">
        <label>Type</label>
        <input type="text" id="fType" list="typeList" placeholder="e.g. Bourbon">
        <datalist id="typeList"></datalist>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Year</label>
        <input type="number" id="fYear" min="2020" max="2035" placeholder="2025">
      </div>
      <div class="field">
        <label>Quarter</label>
        <select id="fQuarter">
          <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Price ($)</label>
        <input type="text" id="fPrice" placeholder="e.g. 75">
      </div>
      <div class="field">
        <label>Proof</label>
        <input type="text" id="fProof" placeholder="e.g. 90">
      </div>
    </div>
    <div class="field">
      <label>Link (optional)</label>
      <input type="url" id="fLink" placeholder="https://…">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('addOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveWhiskey()">Next: Add Scores →</button>
    </div>
    <div id="editDeleteRow" style="display:none;margin-top:10px">
      <button class="btn btn-danger" style="width:100%" onclick="deleteEntry()">Delete This Entry</button>
    </div>
  </div>
</div>

<!-- SCORE MODAL -->
<div class="overlay" id="scoreOverlay" onclick="maybeClose(event,'scoreOverlay')">
  <div class="modal" id="scoreModal">
    <div class="modal-handle"></div>
    <h2 id="scoreModalTitle">Score Whiskey</h2>
    <div class="modal-subtitle" id="scoreModalSub"></div>
    <input type="hidden" id="scoreTargetId">
    <div class="score-entries" id="scoreEntries"></div>
    <div class="field">
      <label>Key Quote (optional)</label>
      <textarea id="fQuote" placeholder="Best line of the night…"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="closeModal('scoreOverlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveScores()">Save Scores</button>
    </div>
  </div>
</div>

let customEntries = [];

function loadCustom(){
  try{ customEntries = JSON.parse(localStorage.getItem('gfwc_entries')||'[]'); }
  catch(e){ customEntries = []; }
}
function saveCustom(){
  localStorage.setItem('gfwc_entries', JSON.stringify(customEntries));
}
function getAllData(){
  return [...BASE, ...customEntries];
}

function normMember(m){
  const lc=(m||'').toLowerCase();
  if(lc==='kbone'||lc==='kev'||lc==='kevin') return 'Kbone';
  if(lc==='jonathan'||lc==='jon') return 'Jonathan';
  if(lc==='topher'||lc==='toph') return 'Topher';
  if(lc==='mck'||lc==='mccaskill') return 'McK';
  if(lc==='connor'||lc==='con') return 'Connor';
  if(lc==='mattison') return 'Mattison';
  return m;
}

function updateTabCounts(){

// ── GRADE HELPERS ────────────────────────────────────────────────────────────
function gradeClass(g){
  if(!g) return 'gNone';
  const map={'A+':'A-plus','A':'A','A-':'A-minus','B+':'B-plus','B':'B','B-':'B-minus',
    'C+':'C-plus','C':'C','C-':'C-minus','D+':'D-plus','D':'D','D-':'D-minus','F':'F'};
  return 'g'+(map[g]||'None');
}
function barColor(s){
  if(s>=8.5) return '#f0c040';
  if(s>=7)   return '#a0d070';
  if(s>=5.5) return '#80b850';
  if(s>=4)   return '#c8b040';
  if(s>=2.5) return '#d08040';
  return '#c04040';
}
function scoreNum(v){ return (v===null||v===undefined||v==='')?null:parseFloat(v); }

function computeAvg(d){
  const vals = MEMBERS.map(m=>scoreNum(d[m.sk])).filter(v=>v!==null&&v>0);
  if(!vals.length) return 0;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const type = document.getElementById('filterType').value;
  const year = document.getElementById('filterYear').value;
  const sort = document.getElementById('sortBy').value;

  let items = getAllData().map(d=>({
    ...d,
    member: normMember(d.member),
    _avg: scoreNum(d.scoreAvg) ?? computeAvg(d)
  })).filter(d=>{
    if(activeMember && d.member !== activeMember) return false;
    if(type && d.type !== type) return false;
    if(year && String(d.year) !== String(year)) return false;
    if(q){
      const hay=[d.whiskey,d.member,d.type,d.quotes,d.gradeAvg,d.quarter,String(d.year)].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  const [sk,sd]=sort.split('-');
  items.sort((a,b)=>{
    let av,bv;
    if(sk==='scoreAvg'){av=a._avg;bv=b._avg;}
    else if(sk==='name'){av=a.whiskey.toLowerCase();bv=b.whiskey.toLowerCase();}
    else if(sk==='price'){av=parseFloat(a.price)||0;bv=parseFloat(b.price)||0;}
    else if(sk==='year'){av=a.year*10+parseInt((a.quarter||'Q0').slice(1));bv=b.year*10+parseInt((b.quarter||'Q0').slice(1));}
    else{av=scoreNum(a[sk])??0;bv=scoreNum(b[sk])??0;}
    return sd==='asc'?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });
  return items;
}

function renderCard(d){
  const avg = d._avg;
  const avgS = avg.toFixed(1);
  const avgLetter = d.gradeAvg || scoreToLetterAvg(avg);
  const bc = barColor(avg);
  const isCustom = d.id && d.id.startsWith('c');

  const scoresHtml = MEMBERS.map(m=>{
    const grade = d[m.gk]||'';
    const score = scoreNum(d[m.sk]);
    const hasScore = score!==null;
    const barW = hasScore?Math.round((score/10)*100):0;
    return `<div class="sc">
      <div class="sc-name">${m.label}</div>
      <div class="sc-grade ${gradeClass(grade)}">${grade||'—'}</div>
      <div class="bar-wrap"><div class="bar" style="width:${barW}%;background:${bc}"></div></div>
      <div class="sc-num">${hasScore?score.toFixed(1):'—'}</div>
    </div>`;
  }).join('');

  const nameHtml = d.link
    ? `<a href="${esc(d.link)}" target="_blank" rel="noopener">${esc(d.whiskey)}</a>`
    : esc(d.whiskey);

  const priceDisp = d.price==='???'?'???':parseFloat(d.price)?'$'+Math.round(parseFloat(d.price)):'—';
  const proofDisp = d.proof&&d.proof!=='???'&&parseFloat(d.proof)?parseFloat(d.proof)+'°':null;

  const tags = [
    d.type?`<span class="tag tag-type">${esc(d.type)}</span>`:'',
    `<span class="tag tag-member">by ${esc(d.member)}</span>`,
    `<span class="tag tag-season">${esc(d.quarter)} ${d.year}</span>`,
    priceDisp&&priceDisp!=='—'?`<span class="tag tag-price">${priceDisp}</span>`:'',
    proofDisp?`<span class="tag tag-proof">${proofDisp} proof</span>`:'',
  ].filter(Boolean).join('');

  const quoteHtml = d.quotes && typeof d.quotes==='string' && d.quotes.trim()
    ? `<div class="quote">${esc(d.quotes)}</div>` : '';

  const customBadge = isCustom?`<span class="custom-badge">new</span>`:'';

  return `<div class="card" id="card-${d.id}">
    <div class="card-top">
      <div class="score-bubble">
        <div class="num" style="color:${bc}">${avgS}</div>
        <div class="denom">/10</div>
        <div class="letter" style="color:${bc}">${avgLetter}</div>
      </div>
      <div class="card-info">
        <div class="whiskey-name">${nameHtml}${customBadge}</div>
        <div class="tags">${tags}</div>
      </div>
    </div>
    <div class="scores-row">${scoresHtml}</div>
    ${quoteHtml}
    <div class="card-footer">
      ${isCustom?`<button class="btn-score" style="margin-right:auto" onclick="openEditModal('${d.id}')">✏ Edit</button>`:''}
      <button class="btn-score" onclick="openScoreModal('${d.id}')">📝 Score</button>
    </div>
  </div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(){
  const items = getFiltered();
  document.getElementById('countInfo').textContent = `${items.length} of ${getAllData().length}`;
  updateTabCounts();
  const grid = document.getElementById('grid');
  if(!items.length){
    grid.innerHTML = '<div class="no-results">No whiskies match your search.</div>';
    return;
  }
  grid.innerHTML = items.map(renderCard).join('');
}

function saveWhiskey(){
  const name = document.getElementById('fName').value.trim();
  if(!name){ document.getElementById('fName').focus(); return; }
  const editId = document.getElementById('editId').value;
  const entry = {
    id: editId || 'c'+Date.now(),
    order: '',
    year: parseInt(document.getElementById('fYear').value)||new Date().getFullYear(),
    quarter: document.getElementById('fQuarter').value,
    member: document.getElementById('fMember').value,
    whiskey: name,
    price: document.getElementById('fPrice').value.trim(),
    proof: document.getElementById('fProof').value.trim(),
    type: document.getElementById('fType').value.trim(),
    link: document.getElementById('fLink').value.trim(),
    gradeJon:'',gradeKev:'',gradeToph:'',gradeMcK:'',gradeCon:'',gradeAvg:'',
    scoreJon:null,scoreKev:null,scoreToph:null,scoreMcK:null,scoreCon:null,scoreAvg:0,
    quotes: '',
  };
  if(editId){
    const existing = customEntries.find(e=>e.id===editId);
    if(existing){
      // preserve existing scores
      Object.assign(entry, {
        gradeJon:existing.gradeJon,gradeKev:existing.gradeKev,
        gradeToph:existing.gradeToph,gradeMcK:existing.gradeMcK,gradeCon:existing.gradeCon,
        gradeAvg:existing.gradeAvg,scoreJon:existing.scoreJon,scoreKev:existing.scoreKev,
        scoreToph:existing.scoreToph,scoreMcK:existing.scoreMcK,scoreCon:existing.scoreCon,
        scoreAvg:existing.scoreAvg,quotes:existing.quotes,
      });
      const idx = customEntries.findIndex(e=>e.id===editId);
      customEntries[idx] = entry;
    }
  } else {
    customEntries.push(entry);
  }
  saveCustom();
  closeModal('addOverlay');
  render();
  // open score modal for the new entry
  openScoreModal(entry.id);
}

function deleteEntry(){
  const id = document.getElementById('editId').value;
  if(!id) return;
  if(!confirm('Delete this entry?')) return;
  customEntries = customEntries.filter(e=>e.id!==id);
  saveCustom();
  closeModal('addOverlay');
  render();
}

function openScoreModal(id){
  const all = getAllData();
  const d = all.find(e=>e.id===id);
  if(!d) return;
  document.getElementById('scoreTargetId').value = id;
  document.getElementById('scoreModalTitle').textContent = 'Score: ' + d.whiskey;
  document.getElementById('scoreModalSub').textContent = `${d.quarter} ${d.year} · Brought by ${normMember(d.member)}`;
  document.getElementById('fQuote').value = d.quotes||'';

  const entries = document.getElementById('scoreEntries');
  entries.innerHTML = MEMBERS.map(m=>{
    const cur = d[m.gk]||'';
    const opts = ['','...not present',...GRADES].map(g=>{
      const label = g===''?'— not scored':g==='...not present'?'— not present':g;
      return `<option value="${g}" ${g===cur?'selected':''}>${label}</option>`;
    }).join('');
    return `<div class="score-entry">
      <span class="mem-name">${m.label}</span>
      <select class="grade-select" id="sg-${m.key}">${opts}</select>
    </div>`;
  }).join('');

  openModal('scoreOverlay');
}

    scoreVals[m.sk] = (g&&g!=='...'&&GRADE_SCORE[g]!==undefined) ? GRADE_SCORE[g] : null;
  });

  const validScores = Object.values(scoreVals).filter(v=>v!==null);
  const avg = validScores.length ? validScores.reduce((a,b)=>a+b,0)/validScores.length : 0;
  const avgLetter = scoreToLetterAvg(avg);

  const update = { ...gradeVals, ...scoreVals, gradeAvg: avgLetter, scoreAvg: avg, quotes: quote };

  // try custom first
  const ci = customEntries.findIndex(e=>e.id===id);
  if(ci>=0){
    customEntries[ci] = {...customEntries[ci], ...update};
    saveCustom();
  } else {
    // it's a base entry — copy to custom with overrides
    const base = BASE.find(e=>e.id===id);
    if(base){
      const overrides = JSON.parse(localStorage.getItem('gfwc_overrides')||'{}');
      overrides[id] = update;
      localStorage.setItem('gfwc_overrides', JSON.stringify(overrides));
      // apply to base copy — we'll handle this in getAllData
    }
  }

  closeModal('scoreOverlay');
  render();
}

// ── MODAL HELPERS ────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); document.body.style.overflow=''; }
function maybeClose(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }

// ── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData(){
  const payload = {
    version: 1,
    exported: new Date().toISOString(),
    entries: customEntries,
  };
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gfwc-entries-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

function importClick(){ document.getElementById('importFile').click(); }
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const data = JSON.parse(ev.target.result);
      const entries = data.entries || data;
      if(!Array.isArray(entries)) throw new Error('bad format');
      if(!confirm(`Import ${entries.length} entries? This will REPLACE your current custom entries.`)) return;
      customEntries = entries;
      saveCustom();
      render();
      alert('Imported successfully!');
    } catch(err){ alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key==='Escape'){
    closeModal('addOverlay');
    closeModal('scoreOverlay');
  }
});

// ── GO ───────────────────────────────────────────────────────────────────────
render();
</script>
